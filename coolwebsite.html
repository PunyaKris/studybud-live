<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Rooms</title>
</head>
<body>
    <h1>Cool Rooms</h1>
    <div id="rooms-containers"> </div>
</body>

<script>

    let roomsContainer = document.getElementById('rooms-containers')

    let getRooms = async () => {
        let response = await fetch('http://127.0.0.1:8000/api/rooms/')
        let rooms = await response.json()
        // console.log('rooms:', rooms)
        for(let i = 0; i < rooms.length; i++){
            let room = rooms[i]
            let row = `<div>
                            <h3>${room.name}</h3>
                        </div>`
            roomsContainer.innerHTML += row
        }
    }

    let getRoom = async (n) => {
        let response = await fetch(`http://127.0.0.1:8000/api/rooms/${n}`)
        let room = await response.json()
        let row = `<div>
                        <h3>${room.name}</h3>
                   </div>`
        roomsContainer.innerHTML += row
    }

    getRoom(1)

</script>

</html>
